server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # ── Public pages ─────────────────────────────────────────
    # Trang thông tin vị trí (quét QR)
    location /vi-tri/ {
        try_files $uri /vi-tri.html =404;
    }

    # Trang thông tin thiết bị
    location /thiet-bi/ {
        try_files $uri /thiet-bi.html =404;
    }

    # Trang kiểm tra thiết bị
    location = /kiem-tra-thiet-bi.html {
        try_files $uri =404;
    }

    # Trang đăng nhập + form kiểm tra
    location = /kiem-tra.html {
        try_files $uri =404;
    }

    # Trang in ma QR
    location = /print-qr.html {
        try_files $uri =404;
    }

    # ── Trang quản lý (segment /quan-ly/) ────────────────────
    location = /quanlyapp {
        try_files /admin/index.html =404;
    }

    location = /quanlyapp/thiet-bi {
        try_files /admin/thiet-bi.html =404;
    }

    # ── Root → trang cảnh báo ────────────────────────────────
    location / {
        return 301 https://www.giavico.com.vn;
    }


    # ── Static assets ────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }


    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
