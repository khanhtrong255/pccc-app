<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cập nhật kiểm tra thiết bị PCCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="/assets/config.js"></script>
  <style>
    :root {
      --red:        #C8342A;
      --red-dark:   #9E2820;
      --red-light:  #FEF2F1;
      --green:      #1B7A45;
      --green-bg:   #EAF5EE;
      --yellow:     #A86B00;
      --yellow-bg:  #FFF6E0;
      --gray-50:    #F7F6F4;
      --gray-100:   #EEECEA;
      --gray-200:   #DDDBD7;
      --gray-300:   #C4C1BC;
      --gray-400:   #9B9894;
      --gray-500:   #716E6A;
      --gray-700:   #3D3B38;
      --gray-900:   #1C1B19;
      --white:      #FFFFFF;
      --radius:     10px;
      --radius-lg:  16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; padding-bottom: 48px; }

    /* ── Header ── */
    .header { background: var(--red); padding: 0 0 20px; position: relative; overflow: hidden; }
    .header-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 300px 200px at 110% -20%, rgba(255,255,255,0.06) 0%, transparent 70%); pointer-events: none; }
    .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 10px; position: relative; }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .brand-icon { width: 30px; height: 30px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .brand-text { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.75); }
    .header-body { padding: 0 20px; position: relative; }
    .page-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 3px; }
    .page-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.25; }
    .page-sub   { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 3px; }

    /* ── Content ── */
    .content { padding: 16px; }
    .section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; padding-left: 2px; }

    /* ── Card ── */
    .card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-100); margin-bottom: 12px; overflow: hidden; }
    .card-body { padding: 16px; }

    /* ── Alert ── */
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.show { display: block; }
    .alert-error   { background: var(--red-light);  color: var(--red);   border: 1px solid #F5C5C2; }
    .alert-success { background: var(--green-bg);   color: var(--green); border: 1px solid #B2DFC2; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; }
    .form-label .req { color: var(--red); margin-left: 2px; }
    .form-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; color: var(--gray-900); background: var(--white); transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--red); }

    /* ── Buttons ── */
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; border: none; border-radius: var(--radius-lg); font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--red);   color: white; }
    .btn-success { background: var(--green); color: white; }
    .btn-outline { background: var(--white); color: var(--gray-500); border: 1.5px solid var(--gray-200); }
    .btn:not(:disabled):active { opacity: 0.85; }

    /* ── User badge ── */
    .user-badge { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--gray-50); border-radius: var(--radius); margin-bottom: 16px; border: 1px solid var(--gray-100); }
    .user-avatar { width: 36px; height: 36px; background: var(--red-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .user-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .user-role { font-size: 11px; font-weight: 600; color: var(--red); background: var(--red-light); border-radius: 10px; padding: 2px 8px; display: inline-block; margin-top: 2px; }
    .btn-logout { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--gray-400); font-family: 'Be Vietnam Pro', sans-serif; text-decoration: underline; padding: 4px; }

    /* ── Thiết bị box ── */
    .tb-box { background: var(--red-light); border: 1px solid #F5C5C2; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; }
    .tb-loai { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--red); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
    .tb-name { font-size: 15px; font-weight: 600; color: var(--red-dark); }
    .tb-khu  { font-size: 12px; color: var(--red); margin-top: 2px; opacity: 0.75; }

    /* ── Tiêu chí ── */
    .tieu-chi-row { padding: 12px 14px; border-bottom: 1px solid var(--gray-100); }
    .tieu-chi-row:last-child { border-bottom: none; }
    .tc-top { display: flex; align-items: flex-start; gap: 10px; }
    .tc-stt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray-400); min-width: 20px; padding-top: 2px; }
    .tc-noi-dung { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-700); line-height: 1.4; }
    .tc-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .tc-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--gray-200); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; }
    .tc-btn:active { transform: scale(0.92); }
    .tc-btn.active-dat   { background: var(--green-bg); border-color: var(--green); }
    .tc-btn.active-khong { background: var(--red-light); border-color: var(--red); }

    .tc-khong-dat-form { margin-top: 10px; margin-left: 30px; display: none; }
    .tc-khong-dat-form.show { display: block; }
    .tc-form-label { font-size: 11px; font-weight: 600; color: var(--yellow); margin-bottom: 4px; display: block; }
    .tc-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #FFD580; border-radius: var(--radius); font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; color: var(--gray-900); background: var(--yellow-bg); outline: none; resize: none; min-height: 60px; }
    .tc-date-input { width: 100%; padding: 9px 12px; border: 1.5px solid #FFD580; border-radius: var(--radius); font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; color: var(--gray-900); background: var(--yellow-bg); outline: none; margin-top: 6px; }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 16px; }
    .progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
    .progress-bar-bg { height: 6px; background: var(--gray-100); border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--green); border-radius: 10px; transition: width 0.3s ease; }

    /* ── Spinner ── */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    .spinner-lg { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--red); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section ── */
    .section { display: none; }
    .section.active { display: block; }
    .state-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 14px; padding: 32px; text-align: center; }
    .state-msg { font-size: 15px; font-weight: 600; color: var(--gray-700); }
    .state-sub { font-size: 13px; color: var(--gray-400); }

    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--gray-400); text-decoration: none; padding: 4px 0; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-bg"></div>
  <div class="header-top">
    <div class="header-brand">
      <div class="brand-icon">🧯</div>
      <span class="brand-text">PCCC</span>
    </div>
  </div>
  <div class="header-body">
    <div class="page-label" id="h-label">Nhân viên kiểm tra</div>
    <div class="page-title" id="h-title">Đăng nhập</div>
    <div class="page-sub"  id="h-sub"></div>
  </div>
</div>

<!-- Loading -->
<div id="state-loading" class="state-wrap" style="display:none">
  <div class="spinner-lg"></div>
  <p class="state-sub">Đang tải...</p>
</div>

<div class="content">

  <!-- ── SECTION: LOGIN ── -->
  <div id="sec-login" class="section active fade-in">
    <div class="card" style="margin-top:16px">
      <div class="card-body">
        <div id="alert-login" class="alert alert-error"></div>
        <div class="form-group">
          <label class="form-label">Mã nhân viên <span class="req">*</span></label>
          <input type="text" id="inp-ma-nv" class="form-input" placeholder="Nhập mã nhân viên" autocomplete="username" inputmode="text">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu <span class="req">*</span></label>
          <input type="password" id="inp-mk" class="form-input" placeholder="Nhập mật khẩu" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Đăng nhập</button>
      </div>
    </div>
    <a id="back-link-login" href="#" class="back-link">← Quay lại trang thiết bị</a>
  </div>

  <!-- ── SECTION: CHECKLIST ── -->
  <div id="sec-checklist" class="section fade-in">

    <div class="user-badge" style="margin-top:16px">
      <div class="user-avatar">👷</div>
      <div style="flex:1;min-width:0">
        <div class="user-name" id="user-name">—</div>
        <span class="user-role" id="user-role">—</span>
      </div>
      <button class="btn-logout" onclick="openDoiMK()">🔑 Đổi MK</button>
      <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
    </div>

    <div class="tb-box" id="tb-box" style="display:none">
      <div class="tb-loai" id="tb-loai">—</div>
      <div class="tb-name" id="tb-name">—</div>
      <div class="tb-khu"  id="tb-khu"></div>
    </div>

    <div id="alert-form" class="alert"></div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-top">
        <span id="prog-label">0 / 0 tiêu chí đã điền</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="section-title">Tiêu chí kiểm tra</div>
    <div id="checklist-wrap"></div>

    <button class="btn btn-success" id="btn-luu" onclick="doLuu()" style="display:none">
      💾 Lưu kết quả kiểm tra
    </button>

    <a id="back-link-checklist" href="#" class="back-link" style="margin-top:12px;display:none">
      ← Quay lại trang thiết bị
    </a>
  </div>

</div>

<!-- Modal đổi mật khẩu -->
<div id="modal-doi-mk" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:16px;width:100%;max-width:360px;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid #EEECEA;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:15px;font-weight:700">Đổi mật khẩu</span>
      <button onclick="closeDoiMK()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9B9894">✕</button>
    </div>
    <div style="padding:20px">
      <div id="alert-doi-mk" class="alert"></div>
      <div class="form-group">
        <label class="form-label">Mật khẩu hiện tại <span class="req">*</span></label>
        <input type="password" id="inp-mk-cu" class="form-input" placeholder="Nhập mật khẩu hiện tại">
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu mới <span class="req">*</span></label>
        <input type="password" id="inp-mk-moi" class="form-input" placeholder="Ít nhất 6 ký tự">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Xác nhận mật khẩu mới <span class="req">*</span></label>
        <input type="password" id="inp-mk-moi2" class="form-input" placeholder="Nhập lại mật khẩu mới">
      </div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid #EEECEA;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" style="width:auto;padding:9px 16px" onclick="closeDoiMK()">Hủy</button>
      <button class="btn btn-primary" style="width:auto;padding:9px 16px" id="btn-doi-mk" onclick="doDoiMK()">💾 Lưu</button>
    </div>
  </div>
</div>

<script>
  let thietBiId   = null;
  let phieuId     = null;
  let authToken   = null;
  let currentUser = null;
  let ketQuaMap   = {};

  const LOAI_LABEL = {
    hop_voi:    'Hộp vòi chữa cháy',
    hop_pha_do: 'Hộp đựng dụng cụ phá dỡ',
    tram_bom:   'Trạm bơm chữa cháy',
  };

  // ── Helpers ──────────────────────────────────────────────
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.className = 'alert alert-' + type + ' show';
    el.textContent = msg;
  }
  function hideAlert(id) { document.getElementById(id).className = 'alert'; }

  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Đang xử lý...' : text;
  }

  function saveSession(token, user) {
    sessionStorage.setItem('pccc_token', token);
    sessionStorage.setItem('pccc_user', JSON.stringify(user));
  }
  function loadSession() {
    const t = sessionStorage.getItem('pccc_token');
    const u = sessionStorage.getItem('pccc_user');
    if (t && u) { authToken = t; currentUser = JSON.parse(u); return true; }
    return false;
  }
  function clearSession() {
    sessionStorage.removeItem('pccc_token');
    sessionStorage.removeItem('pccc_user');
    authToken = null; currentUser = null;
  }

  // ── Login ─────────────────────────────────────────────────
  async function doLogin() {
    const ma = document.getElementById('inp-ma-nv').value.trim();
    const mk = document.getElementById('inp-mk').value;
    if (!ma || !mk) { showAlert('alert-login', 'Vui lòng nhập đầy đủ thông tin', 'error'); return; }
    setLoading('btn-login', true, 'Đăng nhập');
    hideAlert('alert-login');
    try {
      const res  = await fetch(CONFIG.API_BASE_URL + '/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ma_nhan_vien: ma, mat_khau: mk }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert('alert-login', data.detail || 'Đăng nhập thất bại', 'error'); setLoading('btn-login', false, 'Đăng nhập'); return; }
      authToken   = data.access_token;
      currentUser = { ho_ten: data.ho_ten, quyen: data.quyen };
      saveSession(authToken, currentUser);
      await goChecklist();
    } catch(e) {
      showAlert('alert-login', 'Không thể kết nối máy chủ', 'error');
      setLoading('btn-login', false, 'Đăng nhập');
    }
  }

  async function doLogout() {
    try { await fetch(CONFIG.API_BASE_URL + '/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken } }); } catch(e) {}
    clearSession();
    location.reload();
  }

  // ── Checklist ─────────────────────────────────────────────
  async function goChecklist() {
    document.getElementById('h-label').textContent = 'Kiểm tra định kỳ';
    document.getElementById('h-title').textContent = 'Cập nhật kết quả';
    document.getElementById('h-sub').textContent   = currentUser.ho_ten;
    document.getElementById('user-name').textContent = currentUser.ho_ten;
    document.getElementById('user-role').textContent = currentUser.quyen === 'toan_quyen' ? 'Toàn quyền' : 'Bảo vệ';

    document.getElementById('sec-login').classList.remove('active');
    document.getElementById('sec-checklist').classList.add('active');
    document.getElementById('state-loading').style.display = 'flex';

    try {
      // Load thông tin thiết bị
      const resTB = await fetch(CONFIG.API_BASE_URL + '/public/thiet-bi/' + thietBiId);
      if (!resTB.ok) throw new Error('Không tìm thấy thiết bị');
      const tb = await resTB.json();

      document.getElementById('tb-loai').textContent = (LOAI_LABEL[tb.loai] || tb.loai).toUpperCase();
      document.getElementById('tb-name').textContent = tb.ten_hien_thi;
      if (tb.khu_vuc) document.getElementById('tb-khu').textContent = '📍 ' + tb.khu_vuc;
      document.getElementById('tb-box').style.display = 'block';
      document.getElementById('h-title').textContent = tb.ten_hien_thi;
      document.getElementById('h-sub').textContent   = tb.khu_vuc || '';

      // Tạo/lấy phiếu tháng này
      const resP = await fetch(CONFIG.API_BASE_URL + '/public/thiet-bi/' + thietBiId + '/kiem-tra', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
      });
      if (!resP.ok) throw new Error('Không thể tải phiếu kiểm tra');
      const phieu = await resP.json();
      phieuId = phieu.phieu_id;

      // Build ketQuaMap
      ketQuaMap = {};
      phieu.tieu_chi.forEach(tc => {
        ketQuaMap[tc.ket_qua_id] = {
          ket_qua:         tc.ket_qua || null,
          bien_phap:       tc.bien_phap || '',
          ngay_hoan_thanh: tc.ngay_hoan_thanh || '',
        };
      });

      renderChecklist(phieu.tieu_chi);

      document.getElementById('state-loading').style.display  = 'none';
      document.getElementById('progress-wrap').style.display  = 'block';
      document.getElementById('btn-luu').style.display        = 'block';
      document.getElementById('back-link-checklist').style.display = 'inline-flex';
      updateProgress();

    } catch(e) {
      document.getElementById('state-loading').style.display = 'none';
      showAlert('alert-form', e.message || 'Có lỗi xảy ra', 'error');
      document.getElementById('alert-form').classList.add('show');
    }
  }

  // ── Render ────────────────────────────────────────────────
  function renderChecklist(tieuChiList) {
    const wrap = document.getElementById('checklist-wrap');
    wrap.innerHTML =
      '<div class="card" style="margin-bottom:12px">' +
      tieuChiList.map(tc =>
        '<div class="tieu-chi-row" id="row-' + tc.ket_qua_id + '">' +
          '<div class="tc-top">' +
            '<span class="tc-stt">' + tc.stt + '</span>' +
            '<span class="tc-noi-dung">' + tc.noi_dung + '</span>' +
            '<div class="tc-actions">' +
              '<button class="tc-btn ' + (tc.ket_qua === 'dat' ? 'active-dat' : '') + '" id="btn-dat-' + tc.ket_qua_id + '" onclick="setKetQua(\'' + tc.ket_qua_id + '\',\'dat\')">✅</button>' +
              '<button class="tc-btn ' + (tc.ket_qua === 'khong_dat' ? 'active-khong' : '') + '" id="btn-khong-' + tc.ket_qua_id + '" onclick="setKetQua(\'' + tc.ket_qua_id + '\',\'khong_dat\')">❌</button>' +
            '</div>' +
          '</div>' +
          '<div class="tc-khong-dat-form ' + (tc.ket_qua === 'khong_dat' ? 'show' : '') + '" id="form-khong-' + tc.ket_qua_id + '">' +
            '<label class="tc-form-label">⚠ Biện pháp cải thiện</label>' +
            '<textarea class="tc-textarea" id="bp-' + tc.ket_qua_id + '" placeholder="Mô tả biện pháp cải thiện..." onchange="updateBienPhap(\'' + tc.ket_qua_id + '\',this.value)">' + (tc.bien_phap || '') + '</textarea>' +
            '<input type="date" class="tc-date-input" id="ngay-' + tc.ket_qua_id + '" value="' + (tc.ngay_hoan_thanh || '') + '" onchange="updateNgay(\'' + tc.ket_qua_id + '\',this.value)">' +
          '</div>' +
        '</div>'
      ).join('') +
      '</div>';
  }

  // ── Kết quả ───────────────────────────────────────────────
  function setKetQua(kqId, ket_qua) {
    if (!ketQuaMap[kqId]) ketQuaMap[kqId] = {};
    const prev = ketQuaMap[kqId].ket_qua;
    if (prev === ket_qua) {
      ketQuaMap[kqId].ket_qua = null;
      document.getElementById('btn-dat-'    + kqId).className = 'tc-btn';
      document.getElementById('btn-khong-'  + kqId).className = 'tc-btn';
      document.getElementById('form-khong-' + kqId).classList.remove('show');
    } else {
      ketQuaMap[kqId].ket_qua = ket_qua;
      document.getElementById('btn-dat-'   + kqId).className = 'tc-btn ' + (ket_qua === 'dat' ? 'active-dat' : '');
      document.getElementById('btn-khong-' + kqId).className = 'tc-btn ' + (ket_qua === 'khong_dat' ? 'active-khong' : '');
      const formEl = document.getElementById('form-khong-' + kqId);
      if (ket_qua === 'khong_dat') { formEl.classList.add('show'); }
      else { formEl.classList.remove('show'); ketQuaMap[kqId].bien_phap = ''; ketQuaMap[kqId].ngay_hoan_thanh = ''; }
    }
    updateProgress();
  }

  function updateBienPhap(kqId, val) { if (!ketQuaMap[kqId]) ketQuaMap[kqId] = {}; ketQuaMap[kqId].bien_phap = val; }
  function updateNgay(kqId, val)     { if (!ketQuaMap[kqId]) ketQuaMap[kqId] = {}; ketQuaMap[kqId].ngay_hoan_thanh = val; }

  function updateProgress() {
    const all    = Object.keys(ketQuaMap).length;
    const filled = Object.values(ketQuaMap).filter(v => v.ket_qua).length;
    const pct    = all > 0 ? Math.round(filled / all * 100) : 0;
    document.getElementById('prog-label').textContent = filled + ' / ' + all + ' tiêu chí đã điền';
    document.getElementById('prog-pct').textContent   = pct + '%';
    document.getElementById('prog-bar').style.width   = pct + '%';
  }

  // ── Lưu ──────────────────────────────────────────────────
  async function doLuu() {
    setLoading('btn-luu', true, '');
    hideAlert('alert-form');

    const promises = Object.entries(ketQuaMap)
      .filter(([_, val]) => val.ket_qua)
      .map(([kqId, val]) =>
        fetch(CONFIG.API_BASE_URL + '/public/ket-qua-tb/' + kqId, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ket_qua:         val.ket_qua,
            bien_phap:       val.ket_qua === 'khong_dat' ? (val.bien_phap || null) : null,
            ngay_hoan_thanh: val.ket_qua === 'khong_dat' ? (val.ngay_hoan_thanh || null) : null,
          }),
        })
      );

    try {
      await Promise.all(promises);
      showAlert('alert-form', '✅ Lưu kết quả kiểm tra thành công!', 'success');
      document.getElementById('alert-form').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch(e) {
      showAlert('alert-form', 'Có lỗi xảy ra khi lưu', 'error');
      document.getElementById('alert-form').classList.add('show');
    }
    setLoading('btn-luu', false, '💾 Lưu kết quả kiểm tra');
  }

  // ── Đổi mật khẩu ─────────────────────────────────────────
  function openDoiMK() {
    document.getElementById('inp-mk-cu').value = '';
    document.getElementById('inp-mk-moi').value = '';
    document.getElementById('inp-mk-moi2').value = '';
    document.getElementById('alert-doi-mk').className = 'alert';
    document.getElementById('modal-doi-mk').style.display = 'flex';
  }
  function closeDoiMK() { document.getElementById('modal-doi-mk').style.display = 'none'; }

  async function doDoiMK() {
    const cu = document.getElementById('inp-mk-cu').value;
    const moi = document.getElementById('inp-mk-moi').value;
    const moi2 = document.getElementById('inp-mk-moi2').value;
    if (!cu || !moi || !moi2) { showAlert('alert-doi-mk', 'Vui lòng điền đầy đủ thông tin', 'error'); return; }
    if (moi !== moi2) { showAlert('alert-doi-mk', 'Mật khẩu mới không khớp', 'error'); return; }
    if (moi.length < 6) { showAlert('alert-doi-mk', 'Mật khẩu mới phải có ít nhất 6 ký tự', 'error'); return; }
    const btn = document.getElementById('btn-doi-mk');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Đang lưu...';
    try {
      const res = await fetch(CONFIG.API_BASE_URL + '/auth/doi-mat-khau', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
        body: JSON.stringify({ mat_khau_cu: cu, mat_khau_moi: moi }),
      });
      const data = await res.json();
      if (res.ok) { showAlert('alert-doi-mk', '✅ Đổi mật khẩu thành công!', 'success'); setTimeout(closeDoiMK, 1500); }
      else { showAlert('alert-doi-mk', data.detail || 'Có lỗi xảy ra', 'error'); }
    } catch(e) { showAlert('alert-doi-mk', 'Không thể kết nối máy chủ', 'error'); }
    btn.disabled = false; btn.innerHTML = '💾 Lưu';
  }

  // ── Init ──────────────────────────────────────────────────
  function init() {
    thietBiId = new URLSearchParams(window.location.search).get('id');

    if (!thietBiId) {
      document.getElementById('sec-login').classList.remove('active');
      document.getElementById('state-loading').style.display = 'flex';
      document.querySelector('.state-sub').textContent = 'Thiếu thông tin thiết bị';
      return;
    }

    // Back link về trang thông tin (cần qr_code — dùng JS history)
    document.getElementById('back-link-login').href       = 'javascript:history.back()';
    document.getElementById('back-link-checklist').href   = 'javascript:history.back()';

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('sec-login').classList.contains('active')) doLogin();
    });

    if (loadSession()) goChecklist();
  }

  init();
</script>
</body>
