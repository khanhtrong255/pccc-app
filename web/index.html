<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCCC App</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #F7F6F4;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .wrap { max-width: 320px; }
    .icon {
      width: 72px; height: 72px; background: #C8342A;
      border-radius: 20px; display: flex; align-items: center;
      justify-content: center; font-size: 36px; margin: 0 auto 24px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #1C1B19; margin-bottom: 10px; }
    p  { font-size: 14px; color: #716E6A; line-height: 1.7; }
    .qr-hint {
      margin-top: 28px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #EEECEA;
      font-size: 13px;
      color: #9B9894;
      line-height: 1.6;
    }
    .qr-hint strong { color: #1C1B19; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🧯</div>
    <h1>Hệ thống quản lý bình chữa cháy</h1>
    <p>Vui lòng quét mã QR vị trí đặt tại bình chữa cháy để xem thông tin.</p>
    <div class="qr-hint">
      <strong>📱 Hướng dẫn</strong>
      Mở camera điện thoại và quét mã QR dấn tại vị trí đặt bình chữa cháy để xem thông tin.
    </div>
  </div>
</body>
</html>
